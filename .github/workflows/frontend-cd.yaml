name: Frontend Continuous Deployment

on:
  push:
    branches:
      - main
    paths:
      - "starter/frontend/**"
      - ".github/workflows/frontend-cd.yaml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  FRONTEND_ECR_REPOSITORY: ${{ secrets.FRONTEND_ECR_REPOSITORY }}
  REACT_APP_MOVIE_API_URL: ${{ secrets.REACT_APP_MOVIE_API_URL }}

jobs:
  lint:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: starter/frontend/.nvmrc

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-npm-${{ runner.os }}-${{ hashFiles('starter/frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: Test frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: starter/frontend/.nvmrc

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-npm-${{ runner.os }}-${{ hashFiles('starter/frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: CI=true npm run test -- --watchAll=false

  build:
    name: Build and push frontend image
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    defaults:
      run:
        working-directory: starter/frontend
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deployment configuration
        run: |
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}"
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          test -n "${{ secrets.AWS_SESSION_TOKEN }}"
          test -n "${{ secrets.AWS_REGION }}"
          test -n "${{ secrets.FRONTEND_ECR_REPOSITORY }}"
          test -n "${{ secrets.EKS_CLUSTER_NAME }}"
          test -n "${{ secrets.REACT_APP_MOVIE_API_URL }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --build-arg=REACT_APP_MOVIE_API_URL=${REACT_APP_MOVIE_API_URL:-http://localhost:5000} \
            --tag=mp-frontend:${{ github.sha }} \
            .

      - name: Tag image for ECR
        id: image
        run: |
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${FRONTEND_ECR_REPOSITORY}:${{ github.sha }}"
          docker tag mp-frontend:${{ github.sha }} "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Push image to ECR
        run: docker push "${{ steps.image.outputs.image_uri }}"

  deploy:
    name: Deploy frontend to EKS
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: starter/frontend/k8s
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Deploy frontend manifests
        run: |
          kustomize edit set image frontend=${{ needs.build.outputs.image_uri }}
          kustomize build . | kubectl apply -f -

      - name: Verify frontend service URL
        run: |
          kubectl rollout status deployment/frontend --timeout=180s
          kubectl get pods -l app=frontend -o wide
          kubectl get service frontend -o wide

          FRONTEND_HOST=""
          for i in {1..30}; do
            FRONTEND_HOST="$(kubectl get service frontend -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            if [ -n "$FRONTEND_HOST" ]; then
              break
            fi
            FRONTEND_HOST="$(kubectl get service frontend -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
            if [ -n "$FRONTEND_HOST" ]; then
              break
            fi
            echo "Waiting for frontend LoadBalancer address ($i/30)..."
            sleep 10
          done

          if [ -z "$FRONTEND_HOST" ]; then
            echo "Frontend LoadBalancer address was not assigned in time."
            kubectl describe service frontend
            exit 1
          fi

          FRONTEND_URL="http://${FRONTEND_HOST}"
          echo "Frontend service URL: ${FRONTEND_URL}"
          {
            echo "### Frontend EKS Deployment Verification"
            echo ""
            echo "- Image deployed: \`${{ needs.build.outputs.image_uri }}\`"
            echo "- Frontend service URL: ${FRONTEND_URL}"
            echo ""
            echo '```'
            kubectl get service frontend -o wide
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
