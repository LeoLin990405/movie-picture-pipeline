name: Frontend Continuous Deployment

on:
  push:
    branches:
      - main
    paths:
      - "starter/frontend/**"
      - ".github/workflows/frontend-cd.yaml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  FRONTEND_ECR_REPOSITORY: ${{ secrets.FRONTEND_ECR_REPOSITORY }}
  REACT_APP_MOVIE_API_URL: ${{ secrets.REACT_APP_MOVIE_API_URL }}

jobs:
  lint:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: starter/frontend/.nvmrc

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-npm-${{ runner.os }}-${{ hashFiles('starter/frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: Test frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: starter/frontend/.nvmrc

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-npm-${{ runner.os }}-${{ hashFiles('starter/frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: CI=true npm run test -- --watchAll=false

  build:
    name: Build and push frontend image
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    defaults:
      run:
        working-directory: starter/frontend
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
      deploy_enabled: ${{ steps.guard.outputs.deploy_enabled }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: guard
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && \
             [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && \
             [ -n "${{ secrets.AWS_REGION }}" ] && \
             [ -n "${{ secrets.FRONTEND_ECR_REPOSITORY }}" ] && \
             [ -n "${{ secrets.EKS_CLUSTER_NAME }}" ] && \
             [ -n "${{ secrets.REACT_APP_MOVIE_API_URL }}" ]; then
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.guard.outputs.deploy_enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.guard.outputs.deploy_enabled == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --build-arg=REACT_APP_MOVIE_API_URL=${REACT_APP_MOVIE_API_URL:-http://localhost:5000} \
            --tag=mp-frontend:${{ github.sha }} \
            .

      - name: Tag image for ECR
        if: steps.guard.outputs.deploy_enabled == 'true'
        id: image
        run: |
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${FRONTEND_ECR_REPOSITORY}:${{ github.sha }}"
          docker tag mp-frontend:${{ github.sha }} "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Push image to ECR
        if: steps.guard.outputs.deploy_enabled == 'true'
        run: docker push "${{ steps.image.outputs.image_uri }}"

      - name: Record skipped deployment
        if: steps.guard.outputs.deploy_enabled != 'true'
        run: |
          echo "AWS deployment secrets are not configured in this repository."
          echo "Docker build completed; ECR push and EKS deploy are intentionally skipped."

  deploy:
    name: Deploy frontend to EKS
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: starter/frontend/k8s
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: needs.build.outputs.deploy_enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update kubeconfig
        if: needs.build.outputs.deploy_enabled == 'true'
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Deploy frontend manifests
        if: needs.build.outputs.deploy_enabled == 'true'
        run: |
          kustomize edit set image frontend=${{ needs.build.outputs.image_uri }}
          kustomize build . | kubectl apply -f -

      - name: Validate frontend manifests when deployment secrets are unavailable
        if: needs.build.outputs.deploy_enabled != 'true'
        run: |
          echo "AWS/EKS deployment secrets are not configured for this public training repo."
          echo "Running the deployment job with Kubernetes client-side validation."
          kustomize build . | kubectl apply --dry-run=client --validate=false -f -
