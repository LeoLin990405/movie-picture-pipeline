name: Frontend Continuous Integration

on:
  pull_request:
    branches:
      - main
    paths:
      - "starter/frontend/**"
      - ".github/workflows/frontend-ci.yaml"
  workflow_dispatch:

jobs:
  lint:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: starter/frontend/.nvmrc

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-npm-${{ runner.os }}-${{ hashFiles('starter/frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: Test frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: starter/frontend/.nvmrc

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-npm-${{ runner.os }}-${{ hashFiles('starter/frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: CI=true npm run test -- --watchAll=false

  build:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: starter/frontend/.nvmrc

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: frontend-npm-${{ runner.os }}-${{ hashFiles('starter/frontend/package-lock.json') }}
          restore-keys: |
            frontend-npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Verify tests before build
        run: CI=true npm run test -- --watchAll=false

      - name: Build Docker image
        run: |
          docker build \
            --build-arg=REACT_APP_MOVIE_API_URL=http://localhost:5000 \
            --tag=mp-frontend:${{ github.sha }} \
            .
