name: Backend Continuous Deployment

on:
  push:
    branches:
      - main
    paths:
      - "starter/backend/**"
      - ".github/workflows/backend-cd.yaml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  BACKEND_ECR_REPOSITORY: ${{ secrets.BACKEND_ECR_REPOSITORY }}

jobs:
  lint:
    name: Lint backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore pipenv cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/virtualenvs
          key: backend-pipenv-${{ runner.os }}-${{ hashFiles('starter/backend/Pipfile.lock') }}
          restore-keys: |
            backend-pipenv-${{ runner.os }}-

      - name: Install pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install dependencies
        run: pipenv install --dev --deploy

      - name: Run lint
        run: pipenv run lint

  test:
    name: Test backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Restore pipenv cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/virtualenvs
          key: backend-pipenv-${{ runner.os }}-${{ hashFiles('starter/backend/Pipfile.lock') }}
          restore-keys: |
            backend-pipenv-${{ runner.os }}-

      - name: Install pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install dependencies
        run: pipenv install --dev --deploy

      - name: Run tests
        run: pipenv run test

  build:
    name: Build and push backend image
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    defaults:
      run:
        working-directory: starter/backend
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deployment configuration
        run: |
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}"
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          test -n "${{ secrets.AWS_SESSION_TOKEN }}"
          test -n "${{ secrets.AWS_REGION }}"
          test -n "${{ secrets.BACKEND_ECR_REPOSITORY }}"
          test -n "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build --tag=mp-backend:${{ github.sha }} .

      - name: Tag image for ECR
        id: image
        run: |
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${BACKEND_ECR_REPOSITORY}:${{ github.sha }}"
          docker tag mp-backend:${{ github.sha }} "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Push image to ECR
        run: docker push "${{ steps.image.outputs.image_uri }}"

  deploy:
    name: Deploy backend to EKS
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: starter/backend/k8s
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Deploy backend manifests
        run: |
          kustomize edit set image backend=${{ needs.build.outputs.image_uri }}
          kustomize build . | kubectl apply -f -

      - name: Verify backend service URL
        run: |
          kubectl rollout status deployment/backend --timeout=180s
          kubectl get pods -l app=backend -o wide
          kubectl get service backend -o wide

          BACKEND_HOST=""
          for i in {1..30}; do
            BACKEND_HOST="$(kubectl get service backend -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            if [ -n "$BACKEND_HOST" ]; then
              break
            fi
            BACKEND_HOST="$(kubectl get service backend -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
            if [ -n "$BACKEND_HOST" ]; then
              break
            fi
            echo "Waiting for backend LoadBalancer address ($i/30)..."
            sleep 10
          done

          if [ -z "$BACKEND_HOST" ]; then
            echo "Backend LoadBalancer address was not assigned in time."
            kubectl describe service backend
            exit 1
          fi

          BACKEND_URL="http://${BACKEND_HOST}/movies"
          echo "Backend service URL: ${BACKEND_URL}"
          {
            echo "### Backend EKS Deployment Verification"
            echo ""
            echo "- Image deployed: \`${{ needs.build.outputs.image_uri }}\`"
            echo "- Backend service URL: ${BACKEND_URL}"
            echo ""
            echo '```'
            kubectl get service backend -o wide
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
